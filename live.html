<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>AI 产品灵感日报</title>
    <style>
      :root { --bg:#f7f7f4; --paper:#fff; --ink:#18221d; --muted:#65716b; --line:#dfe4df; --green:#0f7a55; --green-soft:#e8f4ee; --amber-soft:#fff3df; }
      *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#faf7f1 0%,#f4efe7 100%);color:var(--ink);font-family:"Segoe UI","Microsoft YaHei",Arial,sans-serif;line-height:1.65}.page{width:min(1040px,calc(100% - 36px));margin:0 auto;padding:34px 0 64px}header{padding:30px 0 24px;border-bottom:2px solid var(--ink)}.eyebrow{color:var(--green);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}h1{margin:8px 0 12px;font-size:42px;line-height:1.12}.intro{max-width:860px;margin:0;color:var(--muted);font-size:17px}.meta,.top-nav{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.top-nav{margin-top:14px}.pill,.nav-link{display:inline-flex;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.72);border-radius:999px;padding:7px 11px;color:var(--muted);font-size:13px;font-weight:700}.nav-link{color:var(--green)}main{display:grid;gap:28px;margin-top:28px}section{background:rgba(255,255,255,.86);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:0 10px 28px rgba(49,40,27,.06)}.plain-section{background:transparent;border:0;box-shadow:none;border-radius:0;padding:0}.section-head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:18px}h2{margin:0;font-size:25px;letter-spacing:-.02em}.note{margin:0;max-width:42ch;color:var(--muted);text-align:right}.rank{display:grid;place-items:center;width:32px;height:32px;border-radius:50%;background:var(--green-soft);color:var(--green);font-weight:900}a{color:var(--green);font-weight:850;text-decoration:none}a:hover{text-decoration:underline}.tag{display:inline-flex;border-radius:999px;padding:4px 8px;background:var(--green-soft);color:var(--green);font-size:12px;font-weight:800}.repo-list{display:grid;gap:12px}.repo-item{border:1px solid var(--line);border-radius:14px;background:#fffdf9;padding:16px}.repo-main{display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:14px;align-items:center}.repo-title{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.repo-metrics{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;color:var(--muted);font-size:13px;font-weight:700}.repo-metrics span{border:1px solid var(--line);border-radius:999px;padding:5px 9px;background:var(--paper)}details{margin-top:12px;border-top:1px solid var(--line);padding-top:12px}summary{cursor:pointer;color:var(--green);font-weight:800}.detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:12px}.detail-grid p{margin:0;color:var(--muted);background:#fbfaf6;border:1px solid var(--line);border-radius:10px;padding:12px}.detail-grid .raw-note{grid-column:1/-1;font-size:13px;color:#7a837d}.signals{display:grid;gap:12px;margin:0;padding:0;list-style:none}.signals li{border-left:4px solid var(--green);background:#fffdf9;border-radius:10px;padding:14px 16px}.callout{background:var(--amber-soft);border-color:#f1d7aa}.loading{color:var(--muted)}@media(max-width:860px){.section-head{align-items:start;flex-direction:column}.note{text-align:left}.repo-main{grid-template-columns:34px 1fr}.repo-metrics{grid-column:2;justify-content:flex-start}.detail-grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="eyebrow">AI Product Radar</div>
        <h1>AI 产品灵感日报</h1>
        <p class="intro">线上自动更新版。每天北京时间 08:00 由 Vercel Cron 预热最新数据，电脑不开机也可以刷新；页面会分成 AI 项目榜和实际应用玩法榜，各 10 条。</p>
        <div class="meta" id="meta"><span class="pill">加载中...</span></div>
        <nav class="top-nav" aria-label="页面导航"><a class="nav-link" href="./archive.html">查看静态历史归档</a><a class="nav-link" href="./api/daily">查看今日 API 数据</a></nav>
      </header>
      <main id="app"><section class="loading">正在读取线上自动更新数据...</section></main>
    </div>
    <script>
      const fmt = new Intl.NumberFormat("en-US");
      const esc = (value = "") => String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      const starLabel = (repo) => repo.starsToday > 0 ? `+${fmt.format(repo.starsToday)} 今日新增` : "24h 新增未公开";
      const categoryLabel = (category = "AI") => ({ "AI Coding": "AI 编程/开发工具", Agent: "Agent / 自动化", Knowledge: "知识库 / 检索", Media: "图片/视频/语音", Creative: "创意生产工具", Presentation: "PPT / 演示文稿", Productivity: "效率工具", AI: "AI 工具" }[category] || category);
      const oneLine = (repo) => ({ Presentation: "把文档、资料或想法转换成可编辑的演示文稿，适合办公交付场景。", Media: "围绕图片、视频、语音或多模态内容生产，帮助用户更快完成创作。", Creative: "面向创作、设计或内容生产，把 AI 能力包装成更容易上手的工具。", Productivity: "把 AI 放进办公、笔记、文档或日常流程，减少重复劳动。", "AI Coding": "面向开发者的 AI 工具，重点是让 AI 更稳定地参与真实开发流程。", Agent: "把 AI 从单次问答升级成可以连续执行任务的 Agent 或工作流。", Knowledge: "帮助 AI 更好地理解、检索和使用资料，让回答更依赖上下文。", AI: "一个值得观察的 AI 项目，重点看它替用户省掉了哪一步。" }[repo.category] || "一个值得观察的 AI 项目，重点看它替用户省掉了哪一步。");
      const repoList = (items) => `<div class="repo-list">${items.map((repo,index)=>`<article class="repo-item"><div class="repo-main"><span class="rank">${index+1}</span><div class="repo-title"><a href="${repo.url}" target="_blank" rel="noreferrer">${esc(repo.name)}</a><span class="tag">${esc(categoryLabel(repo.category))}</span></div><div class="repo-metrics"><span>${starLabel(repo)}</span><span>${fmt.format(repo.starsTotal)} 总星数</span></div></div><details><summary>展开详细解读</summary><div class="detail-grid"><p><strong>一句话理解：</strong>${esc(oneLine(repo))}</p><p><strong>具体玩法：</strong>${esc(repo.play)}</p><p><strong>产品启发：</strong>${esc(repo.inspiration)}</p><p class="raw-note"><strong>GitHub 原始说明：</strong>${esc(repo.summary)}</p></div></details></article>`).join("")}</div>`;
      async function boot() {
        const response = await fetch("./api/daily", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const repos = data.aiProjects || data.repos || [];
        const playbooks = data.applicationPlaybooks || data.mostStarred || [];
        document.querySelector("#meta").innerHTML = `<span class="pill">更新时间：${esc(data.meta.lastUpdated)}</span><span class="pill">主题：AI 产品灵感</span><span class="pill">AI 项目：${repos.length} 条</span><span class="pill">应用玩法：${playbooks.length} 条</span>`;
        document.querySelector("#app").innerHTML = `
          <section class="callout"><div class="section-head"><h2>今天先看什么</h2><p class="note">先看 AI 项目榜判断风向，再看应用玩法榜找灵感。</p></div><p>${esc(data.signals?.[0] || data.meta.note)}</p></section>
          <section><div class="section-head"><h2>24 小时星数最高的 AI 项目</h2><p class="note">偏技术、工具、Agent、工作流和基础能力，帮你看 GitHub 大神们在搭什么。</p></div>${repoList(repos)}</section>
          <section><div class="section-head"><h2>24 小时星数最高的实际应用玩法</h2><p class="note">偏图片、视频、PPT、设计、内容生产、办公工具和可直接上手的 AI 用法。</p></div>${repoList(playbooks)}</section>
          <section class="plain-section"><div class="section-head"><h2>今天的产品信号</h2><p class="note">产品经理视角的快速结论。</p></div><ul class="signals">${(data.signals || []).map((signal) => `<li>${esc(signal)}</li>`).join("")}</ul></section>
        `;
      }
      boot().catch((error) => {
        document.querySelector("#app").innerHTML = `<section><h2>自动更新数据加载失败</h2><p class="summary">请稍后刷新，或打开静态历史归档。错误：${esc(error.message)}</p></section>`;
      });
    </script>
  </body>
</html>
