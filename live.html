<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>AI 产品灵感日报</title>
    <style>
      :root { --bg:#f7f7f4; --paper:#fff; --ink:#18221d; --muted:#65716b; --line:#dfe4df; --green:#0f7a55; --green-soft:#e8f4ee; --amber-soft:#fff3df; }
      *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI","Microsoft YaHei",Arial,sans-serif;line-height:1.65}.page{width:min(1080px,calc(100% - 32px));margin:0 auto;padding:28px 0 56px}header{padding:28px 0 22px;border-bottom:3px solid var(--ink)}.eyebrow{color:var(--green);font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1{margin:8px 0 10px;font-size:42px;line-height:1.15}.intro{max-width:860px;margin:0;color:var(--muted);font-size:17px}.meta,.top-nav{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.top-nav{margin-top:14px}.pill,.nav-link{display:inline-flex;align-items:center;border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:7px 11px;color:var(--muted);font-size:13px;font-weight:700}.nav-link{color:var(--green)}main{display:grid;gap:34px;margin-top:28px}section{background:var(--paper);border:1px solid var(--line);border-radius:8px;padding:22px}.plain-section{background:transparent;border:0;border-radius:0;padding:0}.section-head{display:flex;justify-content:space-between;align-items:end;gap:16px;margin-bottom:16px}h2{margin:0;font-size:26px}.note{margin:0;max-width:44ch;color:var(--muted);text-align:right}table{width:100%;border-collapse:collapse}th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-size:13px;white-space:nowrap}tr:last-child td{border-bottom:0}.rank{width:44px;color:var(--green);font-weight:800}a{color:var(--green);font-weight:800;text-decoration:none}a:hover{text-decoration:underline}.metric{white-space:nowrap;font-weight:800}.summary{color:var(--muted)}.tag{display:inline-flex;border-radius:999px;padding:4px 8px;background:var(--green-soft);color:var(--green);font-size:12px;font-weight:800}.signals{display:grid;gap:12px;margin:0;padding:0;list-style:none}.signals li{border-left:4px solid var(--green);background:var(--paper);border-radius:6px;padding:14px 16px}.project-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.project-card{border:1px solid var(--line);border-radius:8px;padding:16px;background:var(--paper)}.project-card h3{margin:0 0 8px;font-size:18px}.project-card p{margin:8px 0;color:var(--muted)}.callout{background:var(--amber-soft);border-color:#f1d7aa}.loading{color:var(--muted)}@media(max-width:780px){.section-head{align-items:start;flex-direction:column}.note{text-align:left}.table-wrap{overflow-x:auto}table{min-width:860px}.project-grid{grid-template-columns:1fr}}
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="eyebrow">AI Product Radar</div>
        <h1>AI 产品灵感日报</h1>
        <p class="intro">线上自动更新版。每天北京时间 08:00 由 Vercel Cron 预热最新数据，电脑不开机也可以刷新。</p>
        <div class="meta" id="meta"><span class="pill">加载中...</span></div>
        <nav class="top-nav" aria-label="页面导航"><a class="nav-link" href="./archive.html">查看静态历史归档</a><a class="nav-link" href="./api/daily">查看今日 API 数据</a></nav>
      </header>
      <main id="app"><section class="loading">正在读取线上自动更新数据...</section></main>
    </div>
    <script>
      const fmt = new Intl.NumberFormat("en-US");
      const esc = (value = "") => String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
      const tableRows = (items, mode) => `<thead><tr><th>#</th><th>项目</th><th>${mode === "growth" ? "今日新增" : "总 Stars"}</th><th>分类</th><th>它是做什么的</th><th>产品启发</th></tr></thead><tbody>${items.map((repo,index)=>`<tr><td class="rank">${index+1}</td><td><a href="${repo.url}" target="_blank" rel="noreferrer">${esc(repo.name)}</a></td><td class="metric">${mode === "growth" ? `+${fmt.format(repo.starsToday)}` : fmt.format(repo.starsTotal)}</td><td><span class="tag">${esc(repo.category)}</span></td><td class="summary">${esc(repo.summary)}</td><td class="summary">${esc(repo.inspiration)}</td></tr>`).join("")}</tbody>`;
      async function boot() {
        const response = await fetch("./api/daily", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        const repos = data.repos || [];
        const starred = [...repos].sort((a, b) => b.starsTotal - a.starsTotal);
        document.querySelector("#meta").innerHTML = `<span class="pill">更新时间：${esc(data.meta.lastUpdated)}</span><span class="pill">主题：AI 产品灵感</span><span class="pill">数量：${repos.length} 条</span><span class="pill">口径：Vercel Cron 自动更新</span>`;
        document.querySelector("#app").innerHTML = `
          <section class="callout"><div class="section-head"><h2>今天先看什么</h2><p class="note">先看增长榜前 3，再看总星榜前 3。</p></div><p>${esc(data.signals?.[0] || data.meta.note)}</p></section>
          <section><div class="section-head"><h2>24 小时增长最快</h2><p class="note">线上自动筛选 AI 实际应用、Agent、工作流、内容生产和开发者工具。</p></div><div class="table-wrap"><table>${tableRows(repos, "growth")}</table></div></section>
          <section><div class="section-head"><h2>本期总星数最高</h2><p class="note">看长期关注度，判断哪些方向已经有基础盘。</p></div><div class="table-wrap"><table>${tableRows(starred, "stars")}</table></div></section>
          <section class="plain-section"><div class="section-head"><h2>今天的产品信号</h2><p class="note">产品经理视角的快速结论。</p></div><ul class="signals">${(data.signals || []).map((signal) => `<li>${esc(signal)}</li>`).join("")}</ul></section>
          <section><div class="section-head"><h2>项目详情与产品启发</h2><p class="note">先看它是做什么的，再看问题、玩法和启发。</p></div><div class="project-grid">${repos.map((repo)=>`<article class="project-card"><h3><a href="${repo.url}" target="_blank" rel="noreferrer">${esc(repo.name)}</a></h3><span class="tag">${esc(repo.category)}</span><p><strong>它是做什么的：</strong>${esc(repo.summary)}</p><p><strong>解决什么问题：</strong>${esc(repo.problem)}</p><p><strong>AI 玩法：</strong>${esc(repo.play)}</p><p><strong>产品启发：</strong>${esc(repo.inspiration)}</p></article>`).join("")}</div></section>
        `;
      }
      boot().catch((error) => {
        document.querySelector("#app").innerHTML = `<section><h2>自动更新数据加载失败</h2><p class="summary">请稍后刷新，或打开静态历史归档。错误：${esc(error.message)}</p></section>`;
      });
    </script>
  </body>
</html>
